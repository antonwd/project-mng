name: Release
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write     # create release + upload assets
  packages: write     # push to GHCR
  id-token: write     # cosign keyless

jobs:
  helper:
    name: Build helper binaries
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: build
        working-directory: apps/helper
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w -buildid=" \
            -o ../../dist/projectmng-helper-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/projectmng-helper
      - name: sha256
        run: |
          cd dist && sha256sum projectmng-helper-${{ matrix.goos }}-${{ matrix.goarch }} > projectmng-helper-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
      - name: install cosign
        uses: sigstore/cosign-installer@v3
      - name: sign helper (keyless)
        run: |
          cosign sign-blob --yes --output-signature dist/projectmng-helper-${{ matrix.goos }}-${{ matrix.goarch }}.sig \
            dist/projectmng-helper-${{ matrix.goos }}-${{ matrix.goarch }}
      - uses: actions/upload-artifact@v4
        with:
          name: helper-${{ matrix.goarch }}
          path: dist/projectmng-helper-${{ matrix.goos }}-${{ matrix.goarch }}*

  images:
    name: Build + push images
    runs-on: ubuntu-24.04
    outputs:
      api_digest: ${{ steps.api.outputs.digest }}
      web_digest: ${{ steps.web.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
      - id: api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/api.Dockerfile
          # TODO: re-enable linux/arm64 once api.Dockerfile handles
          # nixpacks' tarball-only arm64 distribution (see ./images/api.Dockerfile).
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/api:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/api:latest
      - id: web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: images/web.Dockerfile
          # TODO: re-enable linux/arm64 once api.Dockerfile handles
          # nixpacks' tarball-only arm64 distribution (see ./images/api.Dockerfile).
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/web:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/web:latest
      - name: install cosign
        uses: sigstore/cosign-installer@v3
      - name: sign images (keyless)
        run: |
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/api@${{ steps.api.outputs.digest }}
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/web@${{ steps.web.outputs.digest }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [helper, images]
    steps:
      - uses: actions/checkout@v4
      # Filter by name pattern so we skip the auxiliary .dockerbuild artifacts
      # that build-push-action@v6 uploads automatically. Without this, the
      # release job races against blob-storage downloads it doesn't need.
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: helper-*
      - name: assemble assets + metadata.json
        run: |
          mkdir -p release
          cp artifacts/helper-amd64/projectmng-helper-linux-amd64 release/
          cp artifacts/helper-amd64/projectmng-helper-linux-amd64.sig release/
          cp artifacts/helper-arm64/projectmng-helper-linux-arm64 release/
          cp artifacts/helper-arm64/projectmng-helper-linux-arm64.sig release/
          cp installer/install.sh release/install.sh
          amd64_sha=$(awk '{print $1}' artifacts/helper-amd64/projectmng-helper-linux-amd64.sha256)
          arm64_sha=$(awk '{print $1}' artifacts/helper-arm64/projectmng-helper-linux-arm64.sha256)
          cat > release/metadata.json <<JSON
          {
            "version": "${GITHUB_REF_NAME}",
            "projectmng-helper-linux-amd64.sha256": "${amd64_sha}",
            "projectmng-helper-linux-arm64.sha256": "${arm64_sha}",
            "api_image_digest": "${{ needs.images.outputs.api_digest }}",
            "web_image_digest": "${{ needs.images.outputs.web_digest }}",
            "min_compose_version": "2.20.0"
          }
          JSON
      - name: install cosign
        uses: sigstore/cosign-installer@v3
      - name: sign metadata.json
        run: cosign sign-blob --yes --output-signature release/metadata.json.sig release/metadata.json
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/install.sh
            release/metadata.json
            release/metadata.json.sig
            release/projectmng-helper-linux-amd64
            release/projectmng-helper-linux-amd64.sig
            release/projectmng-helper-linux-arm64
            release/projectmng-helper-linux-arm64.sig
